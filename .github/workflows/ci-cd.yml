name: CI/CD

# Run the full test suite on every push and PR. Deploy to the production
# EC2 host only when tests pass on a push to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid overlapping deploys / redundant runs for the same ref.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────
  # Backend — FastAPI / pytest against real Postgres
  # ───────────────────────────────────────────────
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fleetuser
          POSTGRES_PASSWORD: fleetpass
          POSTGRES_DB: fleetdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleetuser -d fleetdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Several tests use the real SessionLocal, so a live Postgres is required.
      DATABASE_URL: postgresql://fleetuser:fleetpass@localhost:5432/fleetdb

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run pytest
        run: pytest -q

  # ───────────────────────────────────────────────
  # Frontend — Next.js / vitest, plus a build gate
  # ───────────────────────────────────────────────
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test -- --run

      - name: Build (production compile gate)
        run: npm run build

  # ───────────────────────────────────────────────
  # Deploy — only on push to main, after tests pass
  # ───────────────────────────────────────────────
  deploy:
    name: Deploy to production EC2
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Fail the job if any command in the script fails.
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /home/ec2-user/fleet-os

            # Pull the exact commit that passed CI.
            git fetch --all --prune
            git reset --hard origin/main

            # Build new images.
            docker compose build

            # Bring up the database, wait for it, then migrate before
            # starting the app containers.
            docker compose up -d db
            docker compose run --rm api alembic upgrade head

            # Roll out the new api + frontend images.
            docker compose up -d

            # Smoke test: poll the health endpoint for up to ~60s.
            for i in $(seq 1 12); do
              if curl -fsS http://localhost:8000/health > /dev/null; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for API to become healthy ($i/12)..."
              sleep 5
            done
            echo "Health check failed after deploy." >&2
            docker compose logs --tail=50 api >&2
            exit 1
