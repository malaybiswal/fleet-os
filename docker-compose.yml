services:
  # ─────────────────────────────────────────────
  # PostgreSQL 15 — persistent via named volume
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: fleet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetpass}
      POSTGRES_DB: ${POSTGRES_DB:-fleetdb}
    volumes:
      - fleet_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetuser} -d ${POSTGRES_DB:-fleetdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─────────────────────────────────────────────
  # FastAPI backend — waits for DB to be healthy
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleetuser}:${POSTGRES_PASSWORD:-fleetpass}@db:5432/${POSTGRES_DB:-fleetdb}
      API_PORT: ${API_PORT:-8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${API_PORT:-8000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────
  # Next.js frontend — waits for API to be healthy
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

# ─────────────────────────────────────────────
# Named volume — data persists across restarts
# ─────────────────────────────────────────────
volumes:
  fleet_pgdata:
    driver: local
